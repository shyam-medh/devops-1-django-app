services:
  nginx:
    image: ${DOCKERHUB_USERNAME:-local}/django-notes-nginx:${IMAGE_TAG:-v1}
    ports:
      - "8080:80"
    networks:
      - notes-app
    restart: always
    depends_on:
      django:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-test_db}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - notes-app
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  django:
    image: ${DOCKERHUB_USERNAME:-local}/django-notes-backend:${IMAGE_TAG:-v1}
    command: sh -c "python manage.py migrate --no-input && python manage.py collectstatic --no-input && gunicorn notesapp.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DB_NAME: ${DB_NAME:-test_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_PORT: ${DB_PORT:-3306}
      DB_HOST: ${DB_HOST:-db}
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-docker-compose-default-secret-key}
    restart: always
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notes-app
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  mysql-data:

networks:
  notes-app:
